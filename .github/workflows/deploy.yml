name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject form API key
        env:
          FORM_API_KEY: ${{ secrets.FORM_API_KEY }}
        run: |
          if [ -z "${FORM_API_KEY}" ]; then
            echo "ERROR: FORM_API_KEY secret is not set." >&2
            exit 1
          fi
          sed -i "s/__FORM_API_KEY__/${FORM_API_KEY}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
